name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: linux-x86_64
            binary_name: cc-proxy
            asset_name: cc-proxy-linux-x86_64
            rust_target: ""

          - os: macos-latest
            target_name: darwin-x86_64
            binary_name: cc-proxy
            asset_name: cc-proxy-darwin-x86_64
            rust_target: x86_64-apple-darwin

          - os: macos-latest
            target_name: darwin-arm64
            binary_name: cc-proxy
            asset_name: cc-proxy-darwin-arm64
            rust_target: ""

          - os: windows-latest
            target_name: windows-x86_64
            binary_name: cc-proxy.exe
            asset_name: cc-proxy-windows-x86_64.exe
            rust_target: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-

      - name: Add cross-compile target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Build release binary
        run: |
          if [ -n "${{ matrix.rust_target }}" ]; then
            cargo build --release --target ${{ matrix.rust_target }}
          else
            cargo build --release
          fi
        shell: bash

      - name: Rename binary
        shell: bash
        run: |
          if [ -n "${{ matrix.rust_target }}" ]; then
            cp "target/${{ matrix.rust_target }}/release/${{ matrix.binary_name }}" "${{ matrix.asset_name }}"
          else
            cp "target/release/${{ matrix.binary_name }}" "${{ matrix.asset_name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir -p release
          find artifacts -type f | while read f; do
            cp "$f" release/
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish npm Package
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set npm package version from tag
        working-directory: npm
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
